<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="Contact Trazzy for inquiries about our trendy t-shirts. Reach out via our contact form or find our details.">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="logo">
                    <a href="index.html"><img src="logo.png" alt="Trazzy Logo"></a>
                </div>

                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="contact">
            <h1>Contact Us</h1>
            <div class="contact-content">
                <div class="contact-form">
                    <form id="contact-form">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>
                        
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        
                        <label for="message">Message:</label>
                        <textarea id="message" name="message" required></textarea>
                        
                        <button type="submit" class="cta-button">Send Message</button>
                    </form>
                </div>
                <div class="contact-info">
                    <h2>Get in Touch</h2>
                    <p>Email: trazzyy.in@gmail.com</p>
                    <p>Phone: (123) 456-7890</p>
                    <p>Address: Phagwara, Punjab</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>Trazzy</h3>
                <p>Wear your style with confidence.</p>
            </div>
            <div class="footer-section">
                <h3>Quick Links</h3>

                    <li><a href="shop.html">Shop</a></li>

                </ul>
            </div>
            <div class="footer-section">
                <h3>Follow Us</h3>
                <div class="social-icons">
                    <a href="https://www.facebook.com/profile.php?id=61579542984211" aria-label="Facebook" target="_blank" rel="noopener noreferrer"><i class="fab fa-facebook"></i></a>
                    <a href="https://www.instagram.com/trazzy.in/?hl=en" aria-label="Instagram" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i></a>
                    <a href="#" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>

    </footer>
